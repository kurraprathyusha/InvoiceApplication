server.port=${PORT:8080}
server.servlet.context-path=/api

# Database Configuration
DB_URL=jdbc:mysql://localhost:3306/invoice_db?createDatabaseIfNotExist=true
DB_USERNAME=root
DB_PASSWORD=root
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/invoice_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false

# App Settings
app.jwt.secret=${JWT_SECRET:supersecretkeythatisverylongandsecure256bits}
app.jwt.expiration-ms=86400000
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}
